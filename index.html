<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evenstar Trading - Daily Recap Builder v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    font-family: 'DM Sans', sans-serif;
    color: #e4e4e7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px;
  }
  h1 { font-family: 'Cinzel', serif; font-size: 20px; color: #d4d4d8; letter-spacing: 2px; margin-bottom: 6px; }
  .page-sub { font-size: 12px; color: #71717a; margin-bottom: 20px; }

  .controls {
    width: 100%; max-width: 700px;
    background: #1e1f22; border: 1px solid #3a3b40; border-radius: 10px;
    padding: 20px; margin-bottom: 24px;
  }
  .ctrl-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #2a2b30; }
  .ctrl-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .ctrl-label { font-size: 11px; font-weight: 600; color: #9aabe0; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }

  .trade-row {
    display: flex; gap: 5px; align-items: center; margin-bottom: 5px; flex-wrap: wrap;
    padding: 4px 0;
  }
  .trade-row select, .trade-row input {
    background: #16171a; border: 1px solid #3a3b40; border-radius: 5px;
    padding: 5px 6px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    color: #e4e4e7; outline: none;
  }
  .trade-row select:focus, .trade-row input:focus { border-color: #9aabe0; }
  input::placeholder { color: #3f3f46; }

  .sel-analyst { width: 95px; }
  .sel-type { width: 110px; }
  .inp-t { width: 160px; }
  .inp-e { width: 70px; }
  .inp-r { width: 85px; }
  .inp-rec { width: 48px; }
  .inp-pts { width: 60px; }
  .inp-note { width: 120px; }
  .inp-wide { width: 100%; max-width: 380px; }
  .inp-date { width: 140px; }
  .sel-wl { width: 50px; font-size: 11px; }

  .chk-label { font-size: 11px; color: #a1a1aa; cursor: pointer; display: flex; align-items: center; gap: 3px; }
  .chk-label input { accent-color: #fca5a5; }

  .add-btn {
    background: #2a2b30; color: #9aabe0; border: 1px dashed #3a3b40;
    border-radius: 5px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .add-btn:hover { background: #3a3b40; }
  .rm-btn {
    background: none; border: none; color: #52525b; cursor: pointer; font-size: 14px; padding: 0 4px;
  }
  .rm-btn:hover { color: #fca5a5; }

  .btn-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
  .btn {
    padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px;
    font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer;
  }
  .btn:hover { opacity: 0.85; }
  .btn-save { background: #5865F2; color: #fff; }
  .btn-copy { background: #9aabe0; color: #111; }
  .btn-reset { background: #3a3b40; color: #a1a1aa; }
  .btn-status { font-size: 12px; color: #6ee7b7; text-align: center; min-height: 20px; margin-bottom: 16px; }

  .sec { padding: 14px 24px; border-top: 1px solid #3a3b40; }
  .sec-label { font-weight: 600; font-size: 11px; color: #9aabe0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .row { display: flex; align-items: center; padding: 6px 0; }
  .row + .row { border-top: 1px solid rgba(58,59,64,0.5); }
  .r-name { font-weight: 600; font-size: 13px; color: #e4e4e7; width: 85px; }
  .r-tick { font-weight: 600; font-size: 13px; color: #a3b5da; width: 170px; flex-shrink: 0; }
  .r-info { font-weight: 400; font-size: 12px; color: #b0b0b8; flex: 1; }
  .r-res { font-weight: 600; font-size: 13px; text-align: right; width: 100px; }
  .r-res.win { color: #6ee7b7; } .r-res.loss { color: #fca5a5; }
  .no-plays { font-size: 12px; color: #8a8a93; padding: 4px 0; }
  .f-rec { font-size: 12px; color: #b0b0b8; width: 90px; }
  .f-best { font-size: 12px; color: #b0b0b8; flex: 1; text-align: right; }
  .f-best strong { color: #6ee7b7; font-weight: 600; }
  .potd { margin: 14px 24px 18px; padding: 12px 16px; background: rgba(154,171,224,0.07); border-left: 3px solid #9aabe0; border-radius: 0 4px 4px 0; }
  .potd-label { font-weight: 600; font-size: 10px; color: #9aabe0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
  .potd-body { font-size: 13px; color: #c8c8cf; }
  .potd-body strong { color: #e8e8ec; } .potd-body .hl { color: #6ee7b7; font-weight: 600; }
  .foot { padding: 10px 24px; border-top: 1px solid #3a3b40; text-align: center; }
  .foot span { font-size: 10px; color: #62626b; letter-spacing: 1px; }
  .hidden { display: none !important; }
</style>

<script>
var SCOTT_TYPES = ['Alerts','Day Trade','Small Port'];
var OPT_ANALYSTS = ['Arc','Are','Cobain','Waxui','Expo','Shyamal','Hotshootah'];
var FUT_ANALYSTS = ['Arc','Expo','Adides','Hotshootah'];
var STOCK_ANALYSTS = ['Mr. M'];
var MA_ANALYSTS = ['Hotshootah'];
var TRADE_TYPES = ['Call','Put','Call Spread','Put Spread','Shares'];

function makeSelect(options, cls, placeholder) {
  var s = '<select class="'+cls+'"><option value="">'+placeholder+'</option>';
  for (var i = 0; i < options.length; i++) s += '<option value="'+options[i]+'">'+options[i]+'</option>';
  return s + '</select>';
}

function addRow(section) {
  var container = document.getElementById(section+'Rows');
  var div = document.createElement('div');
  div.className = 'trade-row';

  if (section === 'scott') {
    div.innerHTML =
      makeSelect(SCOTT_TYPES, 'sel-type', 'Type') +
      makeSelect(TRADE_TYPES, 'sel-type', 'Call/Put..') +
      '<input type="text" class="inp-t" placeholder="TICK">' +
      '<input type="text" class="inp-e" placeholder="Entry">' +
      '<input type="text" class="inp-e" placeholder="Exit">' +
      '<input type="text" class="inp-r" placeholder="Result">' +
      '<select class="sel-wl"><option value="W">W</option><option value="L">L</option><option value="BE">B/E</option></select>' +
      '<button class="rm-btn" onclick="this.parentElement.remove();renderCard();">&times;</button>';
  }
  else if (section === 'opt') {
    div.innerHTML =
      makeSelect(OPT_ANALYSTS, 'sel-analyst', 'Analyst') +
      makeSelect(TRADE_TYPES, 'sel-type', 'Call/Put..') +
      '<input type="text" class="inp-t" placeholder="TICK">' +
      '<input type="text" class="inp-e" placeholder="Entry">' +
      '<input type="text" class="inp-e" placeholder="Exit">' +
      '<input type="text" class="inp-r" placeholder="Result">' +
      '<select class="sel-wl"><option value="W">W</option><option value="L">L</option><option value="BE">B/E</option></select>' +
      '<button class="rm-btn" onclick="this.parentElement.remove();renderCard();">&times;</button>';
  }
  else if (section === 'fut') {
    div.innerHTML =
      makeSelect(FUT_ANALYSTS, 'sel-analyst', 'Analyst') +
      '<input type="text" class="inp-t" placeholder="TICK">' +
      '<input type="text" class="inp-e" placeholder="Entry">' +
      '<input type="text" class="inp-e" placeholder="Exit">' +
      '<input type="text" class="inp-r" placeholder="Pts/Result">' +
      '<select class="sel-wl"><option value="W">W</option><option value="L">L</option><option value="BE">B/E</option></select>' +
      '<button class="rm-btn" onclick="this.parentElement.remove();renderCard();">&times;</button>';
  }
  else if (section === 'stock') {
    div.innerHTML =
      makeSelect(STOCK_ANALYSTS, 'sel-analyst', 'Analyst') +
      '<input type="text" class="inp-t" placeholder="TICK">' +
      '<input type="text" class="inp-e" placeholder="Entry">' +
      '<input type="text" class="inp-e" placeholder="Exit">' +
      '<input type="text" class="inp-r" placeholder="Result">' +
      '<select class="sel-wl"><option value="W">W</option><option value="L">L</option><option value="BE">B/E</option></select>' +
      '<button class="rm-btn" onclick="this.parentElement.remove();renderCard();">&times;</button>';
  }
  else if (section === 'ma') {
    div.innerHTML =
      makeSelect(MA_ANALYSTS, 'sel-analyst', 'Analyst') +
      '<input type="text" class="inp-wide" placeholder="Summary or notes">' +
      '<button class="rm-btn" onclick="this.parentElement.remove();renderCard();">&times;</button>';
  }

  container.appendChild(div);
  renderCard();
}

function getRows(containerId) {
  var rows = [];
  document.querySelectorAll('#'+containerId+' .trade-row').forEach(function(row) {
    var selects = row.querySelectorAll('select');
    var inputs = row.querySelectorAll('input[type="text"]');
    var wlSel = row.querySelector('.sel-wl');
    rows.push({ selects: selects, inputs: inputs, wl: wlSel ? wlSel.value : 'W' });
  });
  return rows;
}

function renderCard() {
  // Date
  var dateVal = document.getElementById('recapDate').value;
  if (dateVal) {
    var p = dateVal.split('-');
    var d = new Date(p[0], p[1]-1, p[2]);
    var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('cardDate').textContent = 'Daily Recap | ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  var totalW = 0, totalL = 0;

  // === SCOTT ===
  var scottData = getRows('scottRows');
  var scottHtml = '';
  scottData.forEach(function(r) {
    var type = r.selects[0] ? r.selects[0].value : '';
    var ticker = (r.inputs[0] ? r.inputs[0].value : '').toUpperCase();
    var entry = r.inputs[1] ? r.inputs[1].value : '';
    var exit = r.inputs[2] ? r.inputs[2].value : '';
    var result = r.inputs[3] ? r.inputs[3].value : '';
    if (!ticker && !entry && !result) return;
    if (r.wl === 'L') totalL++; else if (r.wl === 'W' && result) totalW++;
    var resClass = r.wl === 'L' ? 'loss' : 'win';
    var resText = r.wl === 'L' ? (result||'\u274C') : r.wl === 'BE' ? 'B/E' : (result||'--');
    scottHtml += '<div class="row"><div class="r-name">'+(type||'Alerts')+'</div><div class="r-tick">'+(ticker||'--')+'</div><div class="r-info">'+(entry||'--')+' \u2192 '+(exit||'--')+'</div><div class="r-res '+resClass+'">'+resText+'</div></div>';
  });
  document.getElementById('cardScottBody').innerHTML = scottHtml || '<div class="no-plays">No plays today</div>';
  document.getElementById('cardScott').classList.toggle('hidden', !scottHtml);

  // === OPTIONS ===
  var optData = getRows('optRows');
  var optHtml = '';
  var optActive = {};
  optData.forEach(function(r) {
    var analyst = r.selects[0] ? r.selects[0].value : '';
    var tradeType = r.selects[1] ? r.selects[1].value : '';
    var ticker = (r.inputs[0] ? r.inputs[0].value : '').toUpperCase();
    var entry = r.inputs[1] ? r.inputs[1].value : '';
    var exit = r.inputs[2] ? r.inputs[2].value : '';
    var result = r.inputs[3] ? r.inputs[3].value : '';
    if (!analyst && !ticker) return;
    if (analyst) optActive[analyst] = true;
    if (r.wl === 'L') totalL++; else if (r.wl === 'W' && result) totalW++;
    var tickDisplay = ticker;
    if (tradeType && ticker) tickDisplay = ticker;
    var infoStr = '';
    if (tradeType === 'Call Spread' || tradeType === 'Put Spread') {
      infoStr = (tradeType||'') + ' ' + (entry||'');
      if (exit) infoStr += ' \u2192 ' + exit;
    } else {
      infoStr = (entry||'--') + ' \u2192 ' + (exit||'--');
    }
    var resClass = r.wl === 'L' ? 'loss' : 'win';
    var resText = r.wl === 'L' ? (result||'\u274C') : r.wl === 'BE' ? 'B/E' : (result||'--');
    optHtml += '<div class="row"><div class="r-name">'+(analyst||'--')+'</div><div class="r-tick">'+(tickDisplay||'--')+'</div><div class="r-info">'+infoStr+'</div><div class="r-res '+resClass+'">'+resText+'</div></div>';
  });
  // No plays line
  var optNoPlays = OPT_ANALYSTS.filter(function(a) { return !optActive[a]; });
  if (optNoPlays.length > 0 && optNoPlays.length < OPT_ANALYSTS.length) {
    optHtml += '<div class="no-plays">'+optNoPlays.join(', ')+': No plays</div>';
  }
  document.getElementById('cardOptBody').innerHTML = optHtml || '<div class="no-plays">No plays today</div>';
  document.getElementById('cardOpt').classList.toggle('hidden', !optHtml && optNoPlays.length === OPT_ANALYSTS.length);

  // === FUTURES ===
  var futData = getRows('futRows');
  // Group by analyst: W-L-BE record + top play
  var futByAnalyst = {};
  futData.forEach(function(r) {
    var analyst = r.selects[0] ? r.selects[0].value : '';
    var ticker = (r.inputs[0] ? r.inputs[0].value : '').toUpperCase();
    var entry = r.inputs[1] ? r.inputs[1].value : '';
    var exit = r.inputs[2] ? r.inputs[2].value : '';
    var pts = r.inputs[3] ? r.inputs[3].value : '';
    if (!analyst) return;
    if (!futByAnalyst[analyst]) futByAnalyst[analyst] = { w: 0, l: 0, be: 0, topTicker: '', topPts: '', trades: [] };
    if (r.wl === 'L') { futByAnalyst[analyst].l++; totalL++; }
    else if (r.wl === 'BE') { futByAnalyst[analyst].be++; }
    else { futByAnalyst[analyst].w++; totalW++; }
    futByAnalyst[analyst].trades.push({ ticker: ticker, pts: pts, wl: r.wl });
    // Track top play (highest pts, skip losses and BE)
    if (r.wl === 'W' && pts) {
      var num = parseFloat(pts.replace(/[^0-9.\-]/g,''));
      var curTop = parseFloat((futByAnalyst[analyst].topPts||'0').replace(/[^0-9.\-]/g,''));
      if (!isNaN(num) && num > curTop) {
        futByAnalyst[analyst].topPts = pts;
        futByAnalyst[analyst].topTicker = ticker;
      }
    }
  });
  var futHtml = '';
  var futActiveNames = {};
  for (var aName in futByAnalyst) {
    futActiveNames[aName] = true;
    var fa = futByAnalyst[aName];
    var rec = fa.w + '-' + fa.l;
    if (fa.be > 0) rec += '-' + fa.be + ' B/E';
    futHtml += '<div class="row"><div class="r-name">'+aName+'</div><div class="f-rec">'+rec+'</div><div class="f-best">Top Play: '+(fa.topTicker||'--')+' <strong>'+(fa.topPts||'--')+'</strong></div></div>';
  }
  var futNoPlays = FUT_ANALYSTS.filter(function(a) { return !futActiveNames[a]; });
  if (futNoPlays.length > 0 && Object.keys(futByAnalyst).length > 0) {
    futHtml += '<div class="no-plays">'+futNoPlays.join(', ')+': No plays</div>';
  }
  document.getElementById('cardFutBody').innerHTML = futHtml || '<div class="no-plays">No plays today</div>';
  document.getElementById('cardFut').classList.toggle('hidden', !futHtml);

  // === STOCKS ===
  var stockData = getRows('stockRows');
  var stockHtml = '';
  var stockActive = {};
  stockData.forEach(function(r) {
    var analyst = r.selects[0] ? r.selects[0].value : '';
    var ticker = (r.inputs[0] ? r.inputs[0].value : '').toUpperCase();
    var entry = r.inputs[1] ? r.inputs[1].value : '';
    var exit = r.inputs[2] ? r.inputs[2].value : '';
    var result = r.inputs[3] ? r.inputs[3].value : '';
    if (!analyst && !ticker) return;
    if (analyst) stockActive[analyst] = true;
    if (r.wl === 'L') totalL++; else if (r.wl === 'W' && result) totalW++;
    var resClass = r.wl === 'L' ? 'loss' : 'win';
    var resText = r.wl === 'L' ? (result||'\u274C') : r.wl === 'BE' ? 'B/E' : (result||'--');
    stockHtml += '<div class="row"><div class="r-name">'+(analyst||'--')+'</div><div class="r-tick">'+(ticker||'--')+'</div><div class="r-info">'+(entry||'--')+' \u2192 '+(exit||'--')+'</div><div class="r-res '+resClass+'">'+resText+'</div></div>';
  });
  document.getElementById('cardStockBody').innerHTML = stockHtml || '<div class="no-plays">No plays today</div>';
  document.getElementById('cardStock').classList.toggle('hidden', !stockHtml);

  // === MARKET ANALYSIS ===
  var maData = getRows('maRows');
  var maHtml = '';
  maData.forEach(function(r) {
    var analyst = r.selects[0] ? r.selects[0].value : '';
    var note = r.inputs[0] ? r.inputs[0].value : '';
    if (analyst || note) maHtml += '<div class="no-plays">'+(analyst||'--')+': '+(note||'No alerts today')+'</div>';
  });
  document.getElementById('cardMABody').innerHTML = maHtml || '<div class="no-plays">No updates today</div>';
  document.getElementById('cardMA').classList.toggle('hidden', !maHtml);

  // Record
  if (totalW > 0 || totalL > 0) {
    document.getElementById('cardRecord').innerHTML = '<span class="w">'+totalW+'W</span><span class="sep"> / </span><span class="l">'+totalL+'L</span>';
  } else {
    document.getElementById('cardRecord').innerHTML = '';
  }

  // POTD
  var pa = document.getElementById('potdAnalyst').value;
  var pt = document.getElementById('potdTicker').value.toUpperCase();
  var pn = document.getElementById('potdNote').value;
  var pr = document.getElementById('potdResult').value;
  if (pa || pt) {
    document.getElementById('cardPotd').classList.remove('hidden');
    document.getElementById('cardPotdBody').innerHTML = '<strong>'+(pa||'TBD')+'</strong> | '+(pt||'--')+' '+(pn?pn+'. ':'')+
      (pr?'<span class="hl">'+pr+'</span>':'');
  } else {
    document.getElementById('cardPotd').classList.add('hidden');
  }
}

// Init
(function() {
  var today = new Date();
  document.getElementById('recapDate').value = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  document.getElementById('controls').addEventListener('input', renderCard);
  document.getElementById('controls').addEventListener('change', renderCard);
  renderCard();
})();

async function saveCard() {
  try {
    document.getElementById('controls').style.display='none';
    document.querySelector('.btn-row').style.display='none';
    document.querySelector('.btn-status').style.display='none';
    document.querySelector('h1').style.display='none';
    document.querySelector('.page-sub').style.display='none';
    var canvas = await html2canvas(document.getElementById('recapCard'),{scale:2,useCORS:true,backgroundColor:'#2b2d31'});
    document.getElementById('controls').style.display='';
    document.querySelector('.btn-row').style.display='';
    document.querySelector('.btn-status').style.display='';
    document.querySelector('h1').style.display='';
    document.querySelector('.page-sub').style.display='';
    var link=document.createElement('a');
    link.download='evenstar-recap-'+(document.getElementById('recapDate').value||'today')+'.png';
    link.href=canvas.toDataURL('image/png');link.click();
    document.getElementById('btnStatus').textContent='Image saved!';
    setTimeout(function(){document.getElementById('btnStatus').textContent='';},3000);
  } catch(e) {
    document.getElementById('controls').style.display='';
    document.querySelector('.btn-row').style.display='';
    document.querySelector('.btn-status').style.display='';
    document.querySelector('h1').style.display='';
    document.querySelector('.page-sub').style.display='';
    document.getElementById('btnStatus').textContent='Error: '+e.message;
  }
}

async function copyCard() {
  try {
    document.getElementById('controls').style.display='none';
    document.querySelector('.btn-row').style.display='none';
    document.querySelector('.btn-status').style.display='none';
    document.querySelector('h1').style.display='none';
    document.querySelector('.page-sub').style.display='none';
    var canvas = await html2canvas(document.getElementById('recapCard'),{scale:2,useCORS:true,backgroundColor:'#2b2d31'});
    document.getElementById('controls').style.display='';
    document.querySelector('.btn-row').style.display='';
    document.querySelector('.btn-status').style.display='';
    document.querySelector('h1').style.display='';
    document.querySelector('.page-sub').style.display='';
    canvas.toBlob(function(blob){
      navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).then(function(){
        document.getElementById('btnStatus').textContent='Copied! Paste into Discord.';
        setTimeout(function(){document.getElementById('btnStatus').textContent='';},3000);
      });
    },'image/png');
  } catch(e) {
    document.getElementById('controls').style.display='';
    document.querySelector('.btn-row').style.display='';
    document.querySelector('.btn-status').style.display='';
    document.querySelector('h1').style.display='';
    document.querySelector('.page-sub').style.display='';
    document.getElementById('btnStatus').textContent='Error: '+e.message;
  }
}

function resetAll() {
  ['scottRows','optRows','futRows','stockRows','maRows'].forEach(function(id){document.getElementById(id).innerHTML='';});
  document.getElementById('potdAnalyst').value='';
  document.getElementById('potdTicker').value='';
  document.getElementById('potdNote').value='';
  document.getElementById('potdResult').value='';
  renderCard();
}
</script>
